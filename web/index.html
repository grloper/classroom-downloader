<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Back up, browse, and share your Google Classroom content in a clean, private, browser-based dashboard. No install, no server." />
  <meta name="color-scheme" content="light dark" />
  <title>Classroom Archiver</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%234f46e5'/%3E%3Cg fill='none' stroke='white' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M5 6h14v3H5z'/%3E%3Cpath d='M6.5 9v8a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V9'/%3E%3Cpath d='M10.5 12.5h3'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Apply saved theme before first paint to avoid a flash.
    try {
      var t = localStorage.getItem('ca-theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
</head>
<body>
  <div id="root" class="app"></div>
  <noscript>
    <div style="max-width:640px;margin:80px auto;padding:0 20px;font-family:sans-serif;text-align:center">
      <h1>Classroom Archiver</h1>
      <p>This app needs JavaScript to run. It works entirely in your browser — nothing is uploaded to a server.</p>
    </div>
  </noscript>
  <script type="module">
    import { startApp } from './src/ui/app.js';
    startApp(document.getElementById('root'));
  </script>
</body>
</html>
