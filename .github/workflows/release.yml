name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: classroom-downloader-win.exe
          - os: ubuntu-latest
            artifact: classroom-downloader-linux
          - os: macos-latest
            artifact: classroom-downloader-mac

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build standalone executable
        run: npm run build:standalone

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets for release
        run: |
          mkdir release-assets
          mv artifacts/classroom-downloader-win.exe/classroom-downloader-win.exe release-assets/ || true
          mv artifacts/classroom-downloader-linux/classroom-downloader-linux release-assets/ || true
          mv artifacts/classroom-downloader-mac/classroom-downloader-mac release-assets/ || true
          chmod +x release-assets/classroom-downloader-linux || true
          chmod +x release-assets/classroom-downloader-mac || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/user-guide.md
          generate_release_notes: true
          files: release-assets/*
