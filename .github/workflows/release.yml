name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: classroom-downloader-win.exe
            command: npx caxa --input . --output "classroom-downloader-win.exe" -- "{{caxa}}/node_modules/node/bin/node.exe" "{{caxa}}/src/system/engine.js"
          - os: ubuntu-latest
            artifact: classroom-downloader-linux
            command: npx caxa --input . --output "classroom-downloader-linux" -- "{{caxa}}/node_modules/node/bin/node" "{{caxa}}/src/system/engine.js"
          - os: macos-latest
            artifact: classroom-downloader-mac
            command: npx caxa --input . --output "classroom-downloader-mac" -- "{{caxa}}/node_modules/node/bin/node" "{{caxa}}/src/system/engine.js"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies and Node runtime
        run: |
          npm ci --omit=dev
          npm install node@20

      - name: Clean unnecessary files
        shell: bash
        run: |
          rm -rf .git .github docs test scripts output sessions

      - name: Build Executable with Caxa
        run: |
          npx caxa@3.0.1 --version
          ${{ matrix.command }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets for release
        run: |
          mkdir release-assets
          mv artifacts/classroom-downloader-win.exe/classroom-downloader-win.exe release-assets/ || true
          mv artifacts/classroom-downloader-linux/classroom-downloader-linux release-assets/ || true
          mv artifacts/classroom-downloader-mac/classroom-downloader-mac release-assets/ || true
          chmod +x release-assets/classroom-downloader-linux || true
          chmod +x release-assets/classroom-downloader-mac || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          generate_release_notes: true
          files: release-assets/*

