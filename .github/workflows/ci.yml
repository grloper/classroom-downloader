name: Validation

on:
  push:
    branches:
      - main
      - develop
      - staging
  pull_request:
    branches:
      - main
      - develop
      - staging

permissions:
  contents: read

jobs:
  quality:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Sanitize public files
        run: npm run sanitize:check

      - name: Compliance check
        run: npm run compliance:check

      - name: Dependency audit (informational)
        # Dependency remediation is owned by Dependabot (weekly npm updates), which
        # opens PRs to bump vulnerable transitive deps. A low-level audit as a hard
        # gate red-fails unrelated PRs whenever a new advisory is published for a
        # dependency we don't control, so this step reports but does not block.
        # Tighten later by removing `continue-on-error` once deps are patched.
        continue-on-error: true
        run: npm audit --audit-level=high
